<div *ngIf="product; else notFound" class="card shadow-sm page-fade product-card">
  <div class="row g-0">
    <div class="col-md-5">
      <img [src]="product.image" class="img-fluid rounded-start w-100 product-img" [alt]="product.name">
    </div>

    <div class="col-md-7">
      <div class="card-body">
        <span class="badge text-bg-secondary mb-2">{{ product.category }}</span>
        <h2>{{ product.name }}</h2>
        <p class="text-muted">{{ product.description }}</p>
        <h3 class="text-primary">{{ product.price | currency:'INR' }}</h3>

        <button class="btn btn-primary me-2" (click)="addToCart()">Add to Cart</button>
        <a class="btn btn-outline-secondary" routerLink="/products">Back to Products</a>
      </div>
    </div>
  </div>
</div>

<ng-template #notFound>
  <div class="alert alert-danger">
    Product not found.
    <a routerLink="/products">Back to products</a>
  </div>
</ng-template>
