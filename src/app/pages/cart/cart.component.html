<div class="card shadow-sm page-fade">
  <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
    <h4 class="mb-0">Shopping Cart</h4>
    <a class="btn btn-light btn-sm" routerLink="/products">Continue Shopping</a>
  </div>

  <div class="card-body">
    <div class="alert alert-info" *ngIf="cartService.getItems().length === 0">
      Cart is empty. <a routerLink="/products">Add products</a>
    </div>

    <div class="table-responsive" *ngIf="cartService.getItems().length > 0">
      <table class="table table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th style="width: 150px;">Quantity</th>
            <th>Subtotal</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of cartService.getItems()">
            <td>{{ item.product.name }}</td>
            <td>{{ item.product.price | currency:'INR' }}</td>
            <td>
              <input type="number" min="1" class="form-control"
                [value]="item.quantity"
                (change)="updateQuantity(item.product._id, $event)">
            </td>
            <td>{{ item.product.price * item.quantity | currency:'INR' }}</td>
            <td>
              <button class="btn btn-danger btn-sm" (click)="cartService.removeItem(item.product._id)">
                Remove
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="text-end">
        <h4>Total: {{ cartService.getTotal() | currency:'INR' }}</h4>
        <a class="btn btn-success" routerLink="/checkout">Proceed to Checkout</a>
      </div>
    </div>
  </div>
</div>
