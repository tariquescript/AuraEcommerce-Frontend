<section class="hero p-4 p-md-5 mb-4">
  <div class="row align-items-center">
    <div class="col-md-8">
      <h1 class="fw-bold">Welcome to AuraEcommerce</h1>
      <p class="lead mb-0">A simple Angular 17 e-commerce demo website for recruitment assessment.</p>
    </div>
    <div class="col-md-4 text-md-end mt-3 mt-md-0">
      <a routerLink="/cart" class="btn btn-light">View Cart</a>
    </div>
  </div>
</section>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Products</h3>
  <span class="text-muted">Frontend only demo</span>
</div>

<div class="row g-4 page-fade product-card">
  <div class="col-sm-6 col-lg-3" *ngFor="let product of products">
    <div class="card h-100 shadow-sm">
      <img [src]="product.image" class="card-img-top product-img" [alt]="product.name">

      <div class="card-body d-flex flex-column">
        <span class="badge text-bg-secondary mb-2 align-self-start">{{ product.category }}</span>
        <h5>{{ product.name }}</h5>
        <p class="text-muted small flex-grow-1">{{ product.description }}</p>
        <h5 class="text-primary">{{ product.price | currency:'INR' }}</h5>

        <div class="d-grid gap-2">
          <a class="btn btn-outline-primary" [routerLink]="['/product', product._id]">View Details</a>
          <button class="btn btn-primary" (click)="addToCart(product)">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>
